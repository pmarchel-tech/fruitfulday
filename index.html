<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DailyPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          screens: {
            'sm': '9999px',
            'md': '9999px',
            'lg': '9999px',
            'xl': '9999px',
            '2xl': '9999px',
          },
          extend: {
            colors: {
              primary: '#bae6fd', // Pastel Blue (Sky-200)
              accent: '#fef08a',  // Pastel Yellow (Yellow-200)
              secondary: '#1c1917', // Stone-900 (Black)
              beige: '#f0f9ff', // Very light pastel blue background
              brand: {
                primary: '#1d4ed8', // Vibrant Blue
                secondary: '#eff6ff', // Light Blue background
                accent: '#3b82f6',
              },
              stone: {
                50: '#fafaf9',
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                400: '#a8a29e',
                500: '#78716c',
                600: '#57534e',
                700: '#44403c',
                800: '#292524',
                900: '#1c1917',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.2s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
<style>
  /* Center the app container on desktop as a mobile view */
  html, body {
    height: 100%;
    overflow: hidden;
    background-color: #f5f5f4; /* Soft background color behind the mobile frame */
  }
  #root {
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    border-left: 1px solid #e7e5e4;
    border-right: 1px solid #e7e5e4;
    position: relative;
    background-color: #ffffff;
    overflow: hidden;
  }
  .pb-safe {
    padding-bottom: env(safe-area-inset-bottom);
  }
  /* Prevent scrollbar layout shifting across all overflow containers */
  .overflow-y-auto, .md\:overflow-y-auto, .overflow-y-scroll {
    scrollbar-gutter: stable;
  }
  /* Custom elegant thin custom scrollbar with accent color to avoid visual layout jumps */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(0, 56, 255, 0.12);
    border-radius: 9999px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 56, 255, 0.25);
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-beige text-secondary antialiased overflow-hidden selection:bg-primary selection:text-secondary">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
